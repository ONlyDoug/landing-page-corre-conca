<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 600 900" width="600" height="900" font-family="Inter, sans-serif">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4C1D95"></stop>
      <stop offset="1" stop-color="#6B21A8"></stop>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#6B21A8" flood-opacity="0.15"></feDropShadow>
    </filter>
    <clipPath id="topRound"><rect x="0" y="0" width="600" height="160" rx="20"></rect></clipPath>
    <clipPath id="botRound"><rect x="0" y="780" width="600" height="120" rx="20"></rect></clipPath>
    <clipPath id="qrClip"><rect x="180" y="315" width="240" height="240" rx="8"></rect></clipPath>
  </defs>

  
  <rect x="10" y="10" width="580" height="880" rx="20" fill="#FFFFFF" filter="url(#cardShadow)"></rect>

  
  <g clip-path="url(#topRound)"><rect x="0" y="0" width="600" height="160" fill="url(#hg)"></rect></g>
  <rect x="20" y="18" width="75" height="48" rx="8" fill="#FFFFFF"></rect>
  <image x="26" y="22" width="63" height="40" preserveAspectRatio="xMidYMid meet" xlink:href="{{LOGO_DATA_URI}}"></image>
  <text x="300" y="80" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="900" letter-spacing="2">CORRE CONÇA</text>
  <text x="300" y="103" text-anchor="middle" fill="#E9D5FF" font-size="11" font-weight="600" letter-spacing="3">CREDENCIAL DO ATLETA</text>
  <rect x="270" y="115" width="60" height="3" fill="#FBBF24"></rect>

  
  <text x="300" y="218" text-anchor="middle" fill="#1E0A3C" font-size="22" font-weight="700">{{NOME_ATLETA}}</text>
  <text x="300" y="268" text-anchor="middle" fill="#6B21A8" font-size="42" font-weight="900">No {{NUMERO_BIB}}</text>

  
  <line x1="40" y1="295" x2="560" y2="295" stroke="#E9D5FF" stroke-width="1.5"></line>

  
  <rect x="180" y="315" width="240" height="240" rx="8" fill="#FFFFFF" stroke="#E9D5FF" stroke-width="1.5"></rect>
  {{QR_CODE_SVG}}
  <text x="300" y="580" text-anchor="middle" fill="#9CA3AF" font-size="12">Apresente este codigo no dia do evento</text>

  
  <line x1="40" y1="600" x2="560" y2="600" stroke="#E9D5FF" stroke-width="1.5"></line>

  
  <rect x="30" y="610" width="255" height="85" rx="8" fill="#F5F3FF"></rect>
  <text x="50" y="635" fill="#9CA3AF" font-size="10" letter-spacing="1.5" font-weight="600">MODALIDADE</text>
  <text x="50" y="660" fill="#1E0A3C" font-size="16" font-weight="700">{{MODALIDADE}}</text>

  <rect x="315" y="610" width="255" height="85" rx="8" fill="#F5F3FF"></rect>
  <text x="335" y="635" fill="#9CA3AF" font-size="10" letter-spacing="1.5" font-weight="600">CAMISETA</text>
  <text x="335" y="660" fill="#1E0A3C" font-size="16" font-weight="700">Tamanho {{TAMANHO_CAMISA}}</text>

  
  <g clip-path="url(#botRound)"><rect x="0" y="780" width="600" height="120" fill="#4C1D95"></rect></g>
  <text x="300" y="822" text-anchor="middle" fill="#E9D5FF" font-size="13" font-weight="600" letter-spacing="1">06 DE SETEMBRO DE 2026</text>
  <text x="300" y="847" text-anchor="middle" fill="#C4B5FD" font-size="12">Conceição da Feira - BA</text>
  <text x="300" y="874" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">correconca.com</text>
</svg>